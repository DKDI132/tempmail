spring.application.name=demo
server.address=127.0.0.1

# ==========================================
# KONFIGURACJA BAZY DANYCH (Zmienne środowiskowe z fallbackiem do localhost)
# ==========================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/testowy?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}

# ==========================================
# OPCJE HIBERNATE / JPA
# ==========================================
# Automatyczna aktualizacja tabel na podstawie klas encji Java
spring.jpa.hibernate.ddl-auto=update

# Pokazywanie zapytań SQL w konsoli
spring.jpa.show-sql=false

# Wyłączenie Open-Session-In-View (OSIV) - kluczowe dla SSE, zapobiega blokowaniu połączeń bazy danych
spring.jpa.open-in-view=false

# Ograniczenie logów Javy tylko do ostrzeżeń i błędów (ochrona prywatności danych)
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.com.example.demo=WARN
server.tomcat.accesslog.enabled=false